<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador — Iniciar Sesión</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="card">
    <div class="logo">
        <span class="logo-icono">🏥</span>
        <h1>Sistema de Cuestionarios</h1>
        <p>Acceso exclusivo para administradores</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <label class="form-label" for="email">Correo electrónico</label>
    <input class="form-input" type="email" id="email"
           placeholder="admin@sistema.com" autocomplete="email">

    <label class="form-label" for="pass">Contraseña</label>
    <input class="form-input" type="password" id="pass"
           placeholder="••••••••">

    <button class="btn-login" id="btn" onclick="login()">
        <span class="spin" id="spin"></span>
        Iniciar sesión
    </button>
</div>

<script src="js/login.js"></script>
</body>
</html>
